[database]
url = "postgresql://codebrain:codebrain_local@localhost:5433/codebrain"

[embeddings]
model = "nomic-embed-text"
dimensions = 768
api_style = "ollama"
base_url = "http://127.0.0.1:11434"

[classifier]
model = "mistralai/devstral-medium-2507"
base_url = "http://127.0.0.1:3000"

[ingestion]
chunk_size = 512
overlap = 64
workers = 4
exclude = [
    "node_modules", ".git", "dist", "build", "__pycache__",
    ".venv", "venv", ".env", "*.lock", "*.min.js", "*.min.css",
    "*.map", "package-lock.json", "yarn.lock", ".next", ".nuxt",
    "coverage", ".pytest_cache", ".mypy_cache", "target"
]

[languages]
supported = [
    "python", "typescript", "javascript", "tsx", "jsx",
    "rust", "go", "java", "c", "cpp", "ruby", "php",
    "swift", "kotlin", "scala", "zig", "elixir", "csharp"
]

# File extension → language mapping (tree-sitter grammar names)
[languages.extensions]
py = "python"
ts = "typescript"
tsx = "tsx"
js = "javascript"
jsx = "javascript"
rs = "rust"
go = "go"
java = "java"
c = "c"
h = "c"
cpp = "cpp"
hpp = "cpp"
cc = "cpp"
rb = "ruby"
php = "php"
swift = "swift"
kt = "kotlin"
scala = "scala"
zig = "zig"
ex = "elixir"
exs = "elixir"
cs = "csharp"
