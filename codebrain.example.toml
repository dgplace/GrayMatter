# Copy this file to .env/codebrain.toml and adjust for your environment.

[database]
url = "postgresql://codebrain:codebrain_local@localhost:5433/codebrain"

[embeddings]
model = "nomic-embed-text"
dimensions = 768
api_style = "ollama"
base_url = "http://127.0.0.1:11434"
context_length = 8192

[classifier]
model = "mistralai/devstral-medium-2507"
base_url = "http://127.0.0.1:3000"

[synthesis]
# Louvain resolution: higher = smaller, more focused modules (default 1.5)
resolution = 1.5
# Maximum members per logical module before recursive splitting (default 20)
max_community_size = 20
# Degree percentile above which nodes are treated as hubs and dampened (default 90.0)
hub_percentile = 90.0
