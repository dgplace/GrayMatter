# Copy this file to .env/codebrain.toml and adjust for your environment.

[database]
url = "postgresql://codebrain:codebrain_local@localhost:5433/codebrain"

[embeddings]
model = "nomic-embed-text"
dimensions = 768
api_style = "ollama"
base_url = "http://127.0.0.1:11434"

[classifier]
model = "mistralai/devstral-medium-2507"
base_url = "http://127.0.0.1:3000"
