services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: codebrain
      POSTGRES_USER: codebrain
      POSTGRES_PASSWORD: codebrain_local
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codebrain -d codebrain"]
      interval: 5s
      timeout: 5s
      retries: 10

  mcp:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    depends_on:
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      MCP_TRANSPORT: http
      MCP_HTTP_HOST: 0.0.0.0
      MCP_HTTP_PORT: "3001"
      MCP_ALLOWED_HOSTS: localhost,127.0.0.1,[::1],applepi3
      DATABASE_URL: postgresql://codebrain:codebrain_local@postgres:5432/codebrain
      EMBED_API_STYLE: ollama
      EMBED_BASE_URL: http://host.docker.internal:11434
      EMBED_MODEL: nomic-embed-text
      EMBED_DIMENSIONS: "768"
    init: true
    ports:
      - "3001:3001"
    restart: unless-stopped
    profiles:
      - tools

volumes:
  postgres_data:
